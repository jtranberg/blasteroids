<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blaasteroids</title>

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon.png?v=4" />
  <link rel="apple-touch-icon" href="/icon.png?v=4" />

  <!-- Optional: browser UI color -->
  <meta name="theme-color" content="#070a16" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #070a16;
    }
    #game {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }
    canvas { outline: none; }
    .hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      color: #cfe3ff;
      font: 14px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      opacity: 0.9;
      user-select: none;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>

<body>
<div id="game"></div>
<div class="hint">
  Thrust: <b>W / ↑</b> · Turn: <b>A / D</b> · Shoot: <b>Space</b> · Restart: <b>R</b><br/>
  Destroy asteroids → difficulty increases (every 10 kills)
</div>

<script>
const W = 900, H = 540;

// Tuning knobs (easy to tweak)
const ASTEROID_MAX_ON_SCREEN = 14;
const SPAWN_START_DELAY = 1100;      // ms at level 1
const SPAWN_MIN_DELAY   = 650;       // ms fastest it can get
const SPAWN_LEVEL_STEP  = 40;        // ms reduction per level
const ASTEROID_BASE_SPEED = 120;     // base drift speed
const ASTEROID_LEVEL_SPEED = 10;     // extra speed per level (gentle)
const ASTEROID_MAX_SPEED = 240;      // hard cap
const ASTEROID_SIZE_MIN = 34;        // px
const ASTEROID_SIZE_MAX = 76;        // px (slightly reduced)

const config = {
  type: Phaser.AUTO,
  parent: "game",
  width: W,
  height: H,
  backgroundColor: "#070a16",
  physics: {
    default: "arcade",
    arcade: { debug:false, gravity:{ y: 0 } }
  },
  scene: { preload, create, update }
};

new Phaser.Game(config);

function preload() {
  this.load.image("ship", "ship.png");
  this.load.image("asteroid", "asteroid.png");
  this.load.image("bullet", "bullet.png");

  const g = this.make.graphics({ add: false });

 

  // Debris puff
  g.clear();
  g.fillStyle(0xffffff, 1);
  g.fillCircle(4, 4, 4);
  g.generateTexture("puff", 8, 8);
}

function create(){
  const s = this;

  s.alive = true;
  s.score = 0;
  s.kills = 0;
  s.level = 1;

  s.cursors = s.input.keyboard.createCursorKeys();
  s.keys = s.input.keyboard.addKeys("A,D,W,SPACE,R");

  // Prevent browser stealing Space/Arrows
  ["SPACE","UP","DOWN","LEFT","RIGHT"].forEach(k=>{
    s.input.keyboard.on("keydown-" + k, e => e.preventDefault());
  });

  // Debris particles
  s.particles = s.add.particles(0, 0, "puff", {
    lifespan: 420,
    speed: { min: 40, max: 260 },
    scale: { start: 0.9, end: 0 },
    quantity: 1,
    emitting: false,
  });

  // Ship
 // 🔥 TIGHT SHIP COLLISION (smaller than sprite)

// Ship
s.ship = s.physics.add.sprite(W/2, H/2, "ship");
s.ship.setDisplaySize(75, 75);
s.ship.setDepth(3);
s.ship.body.setAllowGravity(false);

// 🔥 Tight ship collision (smaller than sprite)
const shipRadius = 25; // tweak 16–20
s.ship.body.setCircle(
  shipRadius,
  (s.ship.displayWidth / 2) - shipRadius,
  (s.ship.displayHeight / 2) - shipRadius
);



  // Drift / inertia
  s.ship.setDrag(18, 18);
  s.ship.setMaxVelocity(420);

  // Groups
  s.asteroids = s.physics.add.group();
  s.bullets = s.physics.add.group();

  // HUD
  s.hud = s.add.text(14,12,"",{
    fontFamily:"system-ui,-apple-system,Segoe UI,Roboto,Arial",
    fontSize:"16px",
    color:"#cfe3ff"
  }).setDepth(10);

  s.hud2 = s.add.text(14,36,"",{
    fontFamily:"system-ui,-apple-system,Segoe UI,Roboto,Arial",
    fontSize:"13px",
    color:"#93c5fd"
  }).setDepth(10);

  // Collisions
  s.physics.add.overlap(s.bullets, s.asteroids, (b, a) => {
    if (!b.active || !a.active) return;
    b.destroy();

    destroyAsteroid(s, a);

    s.kills++;
    s.score += 10;
    if (s.kills % 10 === 0) s.level++;
  });

  s.physics.add.overlap(s.ship, s.asteroids, ()=>gameOver(s));

  // Spawn timer (with max-on-screen cap)
  s.spawnTimer = s.time.addEvent({
    delay: SPAWN_START_DELAY,
    loop:true,
    callback: ()=>{
      if (!s.alive) return;
      if (s.asteroids.getLength() >= ASTEROID_MAX_ON_SCREEN) return;
      spawnAsteroid(s);
    }
  });

  // Guaranteed visible start asteroids (in-bounds)
  spawnAsteroid(s, true);
  spawnAsteroid(s);
  spawnAsteroid(s);
}

function update(){
  const s = this;
  if (!s.alive) return;

  if (Phaser.Input.Keyboard.JustDown(s.keys.R)) {
    s.scene.restart();
    return;
  }

  // Turn
  if (s.keys.A.isDown) s.ship.setAngularVelocity(-240);
  else if (s.keys.D.isDown) s.ship.setAngularVelocity(240);
  else s.ship.setAngularVelocity(0);

  // Thrust forward (ship points up visually, so rotation - PI/2)
  const thrusting = s.keys.W.isDown || s.cursors.up.isDown;
  if (thrusting) {
    const ang = s.ship.rotation - Math.PI/2;
    const ax = Math.cos(ang) * 520;
    const ay = Math.sin(ang) * 520;
    s.ship.setAcceleration(ax, ay);
  } else {
    s.ship.setAcceleration(0,0);
  }

  // Shoot
  if (Phaser.Input.Keyboard.JustDown(s.keys.SPACE)) shoot(s);

  // Wrap
  wrap(s.ship);
  s.asteroids.getChildren().forEach(wrap);

  s.bullets.getChildren().forEach(b=>{
    if (!b.active) return;
    b.life--;
    if (b.life <= 0) b.destroy();
    wrap(b);
  });

  // Difficulty scaling (slower spawn ramp + higher minimum delay)
  s.spawnTimer.delay = Math.max(
    SPAWN_MIN_DELAY,
    SPAWN_START_DELAY - s.level * SPAWN_LEVEL_STEP
  );

  s.hud.setText(`Score: ${s.score}   Kills: ${s.kills}   Level: ${s.level}`);
  s.hud2.setText(`Asteroids: ${s.asteroids.getLength()}   Bullets: ${s.bullets.getLength()}`);
}

function shoot(s){
  const ang = s.ship.rotation - Math.PI / 2;

  const b = s.physics.add.sprite(s.ship.x, s.ship.y, "bullet");
  b.setDepth(4);
  b.body.setAllowGravity(false);
  b.setDrag(0, 0);
  b.life = 90;

  // 🔹 BULLET SIZE + COLLIDER (this is what we just adjusted)
  b.setDisplaySize(100 , 50);   // visual size
  b.body.setCircle(2);       // collision radius
  b.body.setOffset(
    (b.width - 4) / 2,
    (b.height - 4) / 2         
  );

  // Optional glow polish
  b.setAlpha(0.9);
  b.setBlendMode(Phaser.BlendModes.ADD);

  // spawn in front of ship
  b.x += Math.cos(ang) * 28;
  b.y += Math.sin(ang) * 28;

  s.bullets.add(b);

  const speed = 720;
  b.setVelocity(Math.cos(ang) * speed, Math.sin(ang) * speed);
  b.setRotation(s.ship.rotation);
}




// -------------------------
// ASTEROIDS (sprite size + gentle speed)
// -------------------------

function spawnAsteroid(s, inside=false, forcedSize=null, forcedVel=null){
  if (!s.alive) return;

  const pad = 30;
  let x, y;

  if (inside) {
    let tries = 0;
    do {
      x = Phaser.Math.Between(120, W - 120);
      y = Phaser.Math.Between(120, H - 120);
      tries++;
    } while (
      tries < 30 &&
      Phaser.Math.Distance.Between(x, y, s.ship.x, s.ship.y) < 200
    );
  } else {
    const edge = Phaser.Math.Between(0, 3);
    if (edge === 0) { x = -pad;   y = Phaser.Math.Between(0, H); }
    if (edge === 1) { x = W+pad;  y = Phaser.Math.Between(0, H); }
    if (edge === 2) { x = Phaser.Math.Between(0, W); y = -pad; }
    if (edge === 3) { x = Phaser.Math.Between(0, W); y = H+pad; }
  }

  const a = s.physics.add.sprite(x, y, "asteroid");
  a.setDepth(2);
  a.body.setAllowGravity(false);
  a.setDrag(0, 0);

  // Size (pixels)
  const size = forcedSize ?? Phaser.Math.Between(ASTEROID_SIZE_MIN, ASTEROID_SIZE_MAX);
  a.setDisplaySize(size, size);
  a.setData("size", size);

  // ✅ FIXED COLLIDER:
  // setCircle must be in TEXTURE pixels, not display pixels.
  const texR = a.width * 0.45; // based on source image
  a.body.setCircle(texR);
  a.body.setOffset((a.width - texR * 2) / 2, (a.height - texR * 2) / 2);

  // Random start rotation
  a.setRotation(Phaser.Math.FloatBetween(0, Math.PI * 2));

  // ✅ Brighter tint by size (less dark than before)
 // Subtle brightness bump (still looks like stone)
if (size >= 64) a.setTint(0xa3b1c2);      // large – lighter slate
else if (size >= 46) a.setTint(0xd8e1ea); // medium – light stone
else a.setTint(0xf6f9fc);                 // small – near-white highlight
                // bright small

  // Add to group
  s.asteroids.add(a);

  // Velocity (gentler + capped)
  if (forcedVel) {
    a.setVelocity(forcedVel.x, forcedVel.y);
  } else {
    const toCenter = Phaser.Math.Angle.Between(x, y, W/2, H/2);
    const ang = toCenter + Phaser.Math.FloatBetween(-0.8, 0.8);

    const baseSpeed = ASTEROID_BASE_SPEED + s.level * ASTEROID_LEVEL_SPEED;
    const sizeFactor = Phaser.Math.Clamp(70 / size, 0.85, 1.25);
    const speed = Math.min(ASTEROID_MAX_SPEED, baseSpeed * sizeFactor);

    a.setVelocity(Math.cos(ang) * speed, Math.sin(ang) * speed);
  }

  // Spin (gentler)
  const spin = Phaser.Math.Between(-140, 140) * Phaser.Math.Clamp(70 / size, 0.75, 1.25);
  a.setAngularVelocity(spin);

  return a;
}


function destroyAsteroid(s, a){
  const size = a.getData("size") ?? a.displayWidth ?? 60;

  // Debris proportional to size
  const debrisCount = Math.floor(Phaser.Math.Clamp(6 + (size / 4), 8, 30));
  if (s.particles) s.particles.emitParticleAt(a.x, a.y, debrisCount);

  // Screen shake only for big
  if (size >= 64) s.cameras.main.shake(120, 0.006);

  // Split big -> medium -> small
  if (size >= 64) {
    splitAsteroid(s, a, Math.floor(size * 0.68), 2);
  } else if (size >= 46) {
    splitAsteroid(s, a, Math.floor(size * 0.72), 2);
  }

  a.destroy();
}

function splitAsteroid(s, parent, childSize, count){
  const px = parent.x, py = parent.y;
  const pvx = parent.body?.velocity?.x ?? 0;
  const pvy = parent.body?.velocity?.y ?? 0;

  for (let i = 0; i < count; i++) {
    const ang = Phaser.Math.FloatBetween(0, Math.PI * 2);
    const burst = Phaser.Math.FloatBetween(70, 120); // was 90-160, now gentler

    const vx = pvx * 0.55 + Math.cos(ang) * burst;
    const vy = pvy * 0.55 + Math.sin(ang) * burst;

    const frag = spawnAsteroid(s, true, childSize, { x: vx, y: vy });
    frag.setPosition(px, py);
  }
}

// -------------------------
// Helpers
// -------------------------

function wrap(obj){
  const pad = 40;
  if (obj.x <= -pad) obj.x = W + pad;
  if (obj.x >= W + pad) obj.x = -pad;
  if (obj.y <= -pad) obj.y = H + pad;
  if (obj.y >= H + pad) obj.y = -pad;
}

function gameOver(s){
  s.alive = false;
  s.spawnTimer.paused = true;

  s.ship.setTint(0xff4d4d);
  s.ship.setAcceleration(0,0);
  s.ship.setVelocity(0,0);
  s.ship.setAngularVelocity(0);

  s.add.text(W/2, H/2,
    `💥 SHIP DESTROYED\nScore: ${s.score}\n\nPress R to restart`,
    { fontFamily:"system-ui", fontSize:"28px", color:"#fff", align:"center" }
  ).setOrigin(0.5);
}
</script>

</body>
</html>
