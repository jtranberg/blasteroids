<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blaasteroids</title>

  <link rel="icon" href="/icon.png?v=4" />
  <style>
    html, body { height:100%; margin:0; background:#070a16; }
    #game { width:100%; height:100%; display:grid; place-items:center; }
    canvas { outline:none; }
    .hint{
      position:fixed; left:12px; bottom:12px;
      color:#cfe3ff;
      font:14px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial;
      opacity:.9;
      user-select:none;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<div id="game"></div>
<div class="hint">
  Thrust: <b>W / ↑</b> · Turn: <b>A / D</b> · Shoot: <b>Space</b> · Restart: <b>R</b><br/>
  Destroy asteroids → difficulty increases (every 10 kills)
</div>

<script>
const W = 900, H = 540;

const config = {
  type: Phaser.AUTO,
  parent: "game",
  width: W,
  height: H,
  backgroundColor: "#070a16",
  physics: {
    default: "arcade",
    arcade: { debug:false, gravity:{ y: 0 } }
  },
  scene: { preload, create, update }
};

new Phaser.Game(config);

function preload(){
  const g = this.make.graphics({ add:false });

  // Ship (triangle)
  g.clear();
  g.fillStyle(0x60a5fa,1);
  g.beginPath();
  g.moveTo(16,0);
  g.lineTo(32,32);
  g.lineTo(16,24);
  g.lineTo(0,32);
  g.closePath();
  g.fillPath();
  g.generateTexture("ship",32,32);

  // Asteroid
  g.clear();
  g.fillStyle(0x94a3b8,1);
  g.fillCircle(20,20,18);
  g.lineStyle(2,0x070a16,0.4);
  g.strokeCircle(20,20,18);
  g.generateTexture("asteroid",40,40);

  // Bullet
  g.clear();
  g.fillStyle(0xfbbf24,1);
  g.fillRect(0,0,10,4);
  g.generateTexture("bullet",10,4);
}

function create(){
  const s = this;

  s.alive = true;
  s.score = 0;
  s.kills = 0;
  s.level = 1;

  s.cursors = s.input.keyboard.createCursorKeys();
  s.keys = s.input.keyboard.addKeys("A,D,W,SPACE,R");

  // Prevent browser stealing Space/Arrows
  ["SPACE","UP","DOWN","LEFT","RIGHT"].forEach(k=>{
    s.input.keyboard.on("keydown-" + k, e => e.preventDefault());
  });

  // Ship
  s.ship = s.physics.add.sprite(W/2, H/2, "ship");
  s.ship.setDepth(3);
  s.ship.body.setAllowGravity(false);

  // ✅ Drift / inertia (pure Arcade):
  // lower drag = more drift; higher = tighter
  s.ship.setDrag(18, 18);
  s.ship.setMaxVelocity(420);

  // Groups
  s.asteroids = s.physics.add.group();
  s.bullets = s.physics.add.group();

  // HUD
  s.hud = s.add.text(14,12,"",{
    fontFamily:"system-ui,-apple-system,Segoe UI,Roboto,Arial",
    fontSize:"16px",
    color:"#cfe3ff"
  }).setDepth(10);

  s.hud2 = s.add.text(14,36,"",{
    fontFamily:"system-ui,-apple-system,Segoe UI,Roboto,Arial",
    fontSize:"13px",
    color:"#93c5fd"
  }).setDepth(10);

  // Collisions
  s.physics.add.overlap(s.bullets, s.asteroids, (b,a)=>{
    if (!b.active || !a.active) return;
    b.destroy();
    a.destroy();
    s.kills++;
    s.score += 10;
    if (s.kills % 10 === 0) s.level++;
  });

  s.physics.add.overlap(s.ship, s.asteroids, ()=>gameOver(s));

  // Spawn timer
  s.spawnTimer = s.time.addEvent({
    delay: 900,
    loop:true,
    callback: ()=>spawnAsteroid(s)
  });

  // ✅ Guaranteed visible start asteroid (in-bounds)
  spawnAsteroid(s, true);
  // plus a couple normal ones
  spawnAsteroid(s);
  spawnAsteroid(s);
}

function update(){
  const s = this;
  if (!s.alive) return;

  if (Phaser.Input.Keyboard.JustDown(s.keys.R)) {
    s.scene.restart();
    return;
  }

  // Turn
  if (s.keys.A.isDown) s.ship.setAngularVelocity(-240);
  else if (s.keys.D.isDown) s.ship.setAngularVelocity(240);
  else s.ship.setAngularVelocity(0);

  // Thrust forward (ship points up visually, so rotation - PI/2)
  const thrusting = s.keys.W.isDown || s.cursors.up.isDown;
  if (thrusting) {
    const ang = s.ship.rotation - Math.PI/2;
    const ax = Math.cos(ang) * 520;
    const ay = Math.sin(ang) * 520;
    s.ship.setAcceleration(ax, ay);
  } else {
    s.ship.setAcceleration(0,0);
  }

  // Shoot
  if (Phaser.Input.Keyboard.JustDown(s.keys.SPACE)) shoot(s);

  // Wrap
  wrap(s.ship);
  s.asteroids.getChildren().forEach(wrap);

  s.bullets.getChildren().forEach(b=>{
    if (!b.active) return;
    b.life--;
    if (b.life <= 0) b.destroy();
    wrap(b);
  });

  // Difficulty scaling
  s.spawnTimer.delay = Math.max(260, 900 - s.level * 80);

  s.hud.setText(`Score: ${s.score}   Kills: ${s.kills}   Level: ${s.level}`);
  s.hud2.setText(`Asteroids: ${s.asteroids.getLength()}   Bullets: ${s.bullets.getLength()}`);
}

function shoot(s){
  const ang = s.ship.rotation - Math.PI / 2;

  const b = s.physics.add.sprite(s.ship.x, s.ship.y, "bullet");
  b.setDepth(4);
  b.body.setAllowGravity(false);
  b.setDrag(0, 0);
  b.life = 90;

  // spawn in front of ship
  b.x += Math.cos(ang) * 22;
  b.y += Math.sin(ang) * 22;

  // ✅ add to group FIRST, then apply velocity (prevents group reset wiping it)
  s.bullets.add(b);

  const speed = 720;
  b.setVelocity(Math.cos(ang) * speed, Math.sin(ang) * speed);

  b.setRotation(s.ship.rotation);
}



function spawnAsteroid(s, inside=false){
  if (!s.alive) return;

  const pad = 30;
  let x, y;

  if (inside) {
    let tries = 0;
    do {
      x = Phaser.Math.Between(120, W - 120);
      y = Phaser.Math.Between(120, H - 120);
      tries++;
    } while (
      tries < 30 &&
      Phaser.Math.Distance.Between(x, y, s.ship.x, s.ship.y) < 200
    );
  } else {
    const edge = Phaser.Math.Between(0, 3);
    if (edge === 0) { x = -pad;   y = Phaser.Math.Between(0, H); }
    if (edge === 1) { x = W+pad;  y = Phaser.Math.Between(0, H); }
    if (edge === 2) { x = Phaser.Math.Between(0, W); y = -pad; }
    if (edge === 3) { x = Phaser.Math.Between(0, W); y = H+pad; }
  }

  const a = s.physics.add.sprite(x, y, "asteroid");
  a.setDepth(2);
  a.body.setAllowGravity(false);

  // 🔹 RANDOM SIZE
  const scale = Phaser.Math.FloatBetween(0.55, 1.25);
  a.setScale(scale);

  // 🔹 collision size matches visual
  const radius = 18 * scale;
  a.setCircle(radius, 20 - radius, 20 - radius);

  a.setDrag(0, 0);

  // add to group first (important)
  s.asteroids.add(a);

  // 🔹 direction toward center with wobble
  const toCenter = Phaser.Math.Angle.Between(x, y, W/2, H/2);
  const ang = toCenter + Phaser.Math.FloatBetween(-0.8, 0.8);

  // 🔹 speed scales with size (big = slower)
  const baseSpeed = 160 + s.level * 28;
  const speed = baseSpeed * Phaser.Math.Clamp(1.4 - scale, 0.6, 1.2);

  a.setVelocity(
    Math.cos(ang) * speed,
    Math.sin(ang) * speed
  );

  // 🔹 rotation scales with size
  a.setAngularVelocity(
    Phaser.Math.Between(-160, 160) * Phaser.Math.Clamp(1.3 - scale, 0.6, 1.2)
  );
}



function wrap(obj){
  const pad = 40;
  if (obj.x <= -pad) obj.x = W + pad;
  if (obj.x >= W + pad) obj.x = -pad;
  if (obj.y <= -pad) obj.y = H + pad;
  if (obj.y >= H + pad) obj.y = -pad;
}

function gameOver(s){
  s.alive = false;
  s.spawnTimer.paused = true;

  s.ship.setTint(0xff4d4d);
  s.ship.setAcceleration(0,0);
  s.ship.setVelocity(0,0);
  s.ship.setAngularVelocity(0);

  s.add.text(W/2, H/2,
    `💥 SHIP DESTROYED\nScore: ${s.score}\n\nPress R to restart`,
    { fontFamily:"system-ui", fontSize:"28px", color:"#fff", align:"center" }
  ).setOrigin(0.5);
}
</script>
</body>
</html>
